name: "DevFlow: Refine"

on:
  repository_dispatch:
    types: [devflow-refine, devflow-re-refine]

run-name: "${{ github.event.action }} · ${{ github.event.client_payload.issue_key }} → ${{ github.event.client_payload.project_key }}"

jobs:
  refine:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📋 ${{ github.event.client_payload.issue_key }} | ${{ github.event.action }}"
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║         DevFlow Kit — Refinement         ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Event:     ${{ github.event.action }}"
          echo "║ Ticket:    ${{ github.event.client_payload.issue_key }}"
          echo "║ Project:   ${{ github.event.client_payload.project_key }}"
          echo "║ Component: ${{ github.event.client_payload.component }}"
          echo "║ Summary:   ${{ github.event.client_payload.summary }}"
          echo "╚══════════════════════════════════════════╝"

      - name: Checkout devflow-kit
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync
          npm install -g @anthropic-ai/claude-code

      - name: "🤖 Run refinement · ${{ github.event.client_payload.issue_key }}"
        env:
          PYTHONUNBUFFERED: "1"
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          PROJECT_KEY: ${{ github.event.client_payload.project_key }}
          COMPONENT: ${{ github.event.client_payload.component }}
          SUMMARY: ${{ github.event.client_payload.summary }}
          DESCRIPTION: ${{ github.event.client_payload.description }}
          EVENT_TYPE: ${{ github.event.action }}
          FEEDBACK: ${{ github.event.client_payload.feedback }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.client_payload.github_issue_number }}
        run: uv run python run_agent.py refinement