name: "DevFlow: Graphify Onboard"

# Builds a Graphify knowledge graph for newly onboarded target repos.
# Triggers when repo-map.json changes (auto-onboard) or manually via dispatch.

on:
  push:
    branches: [main]
    paths: ["repo-map.json"]
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to (re)onboard, e.g. owner/name. Blank = all missing."
        required: false
      branch:
        description: "Branch to index (default: main)"
        required: false
        default: "main"
      force:
        description: "Rebuild even if a graph already exists"
        type: boolean
        default: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.disc.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12

      - run: uv sync --extra storage

      - id: disc
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GRAPH_STORE_BUCKET: ${{ secrets.GRAPH_STORE_BUCKET }}
          GRAPH_STORE_ENDPOINT: ${{ secrets.GRAPH_STORE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if [ -n "${{ inputs.repo }}" ]; then
            matrix='{"include":[{"repo":"${{ inputs.repo }}","branch":"${{ inputs.branch }}"}]}'
          else
            force_flag=""
            if [ "${{ inputs.force }}" = "true" ]; then force_flag="--force"; fi
            matrix=$(uv run python -m tools.graphify_cli discover --mode onboard $force_flag)
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered: $matrix"

  build:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: graphify-${{ matrix.repo }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12

      - run: uv sync --extra storage --extra graphify

      - name: "Build graph · ${{ matrix.repo }}"
        env:
          PYTHONUNBUFFERED: "1"
          LLM_MODEL: ${{ vars.GRAPHIFY_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GRAPH_STORE_BUCKET: ${{ secrets.GRAPH_STORE_BUCKET }}
          GRAPH_STORE_ENDPOINT: ${{ secrets.GRAPH_STORE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: uv run python -m tools.graphify_cli onboard --repo "${{ matrix.repo }}" --branch "${{ matrix.branch }}"
